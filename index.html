<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Produtos</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh}
    :root{--color:#EE4D2D;--on-color:#FFFFFF}
    header{background:var(--color);color:var(--on-color);padding:16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    header h1{font-size:1.15rem;margin-bottom:10px}
    .search-row{display:flex;gap:8px;max-width:380px;margin:0 auto}
    .search-row input{flex:1;padding:10px 14px;border:none;border-radius:8px;font-size:1rem;outline:none}
    .search-row button{background:rgba(255,255,255,.2);color:var(--on-color);border:2px solid rgba(255,255,255,.5);padding:10px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:700;white-space:nowrap}
    .search-row button:hover{background:rgba(255,255,255,.3)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;padding:18px;max-width:920px;margin:0 auto}
    .card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,.10);transition:transform .18s,box-shadow .18s;position:relative;padding:12px;min-height:360px;display:flex;flex-direction:column}
    .card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
    .card-img-wrap{position:relative}
    .card-img{width:100%;aspect-ratio:.78;object-fit:cover;background:#eee;display:block;border-radius:14px}
    .card-placeholder{width:100%;aspect-ratio:.78;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;border-radius:14px}
    .card-badge{position:absolute;top:10px;left:10px;background:#FFD233;color:#D9480F;font-size:.72rem;font-weight:900;padding:8px 12px;border-radius:12px;box-shadow:0 8px 18px rgba(255,210,51,.35)}
    .card-overlay{position:absolute;left:0;right:0;bottom:0;padding:38px 12px 12px;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,.18) 30%,rgba(0,0,0,.72) 100%)}
    .card-num{display:inline-block;background:#F8693C;color:#fff;font-size:.68rem;font-weight:800;padding:4px 10px;border-radius:999px;margin-bottom:8px}
    .card-name{font-size:.96rem;font-weight:800;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.32;text-shadow:0 2px 8px rgba(0,0,0,.35)}
    .card-price{font-size:1rem;font-weight:800;color:var(--color);margin:12px 0 10px}
    .card-btn{display:block;width:100%;background:#FF5A2A;color:#fff;text-align:center;padding:12px;border-radius:12px;text-decoration:none;font-size:.92rem;font-weight:800;margin-top:auto}
    .card-btn:hover{opacity:.88}
    .empty{text-align:center;padding:50px 16px;color:#999;font-size:.95rem}
    footer{text-align:center;padding:24px 16px;color:#bbb;font-size:.72rem}
    .hidden{display:none!important}
  </style>
</head>
<body>
<header>
  <h1 id="header-title">Produtos</h1>
  <div class="search-row">
    <input type="number" id="num-input" placeholder="Número do produto..." min="1">
    <button onclick="clearSearch()">Ver todos</button>
  </div>
</header>
<div class="grid" id="grid"></div>
<div class="empty hidden" id="empty">Produto não encontrado.</div>
<footer id="footer"></footer>
<script>
let all=[];
async function init(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    const d=await r.json();
    const c=d.theme_color||'#EE4D2D';
    const onColor=d.theme_text_color||'#FFFFFF';
    document.documentElement.style.setProperty('--color',c);
    document.documentElement.style.setProperty('--on-color',onColor);
    const t=d.account_name||'Produtos';
    document.getElementById('page-title').textContent=t;
    document.getElementById('header-title').textContent=t;
    all=(d.products||[]).sort((a,b)=>b.num-a.num);
    render(all);
    const u=d.updated_at?new Date(d.updated_at).toLocaleDateString('pt-BR'):'';
    document.getElementById('footer').textContent=u?'Atualizado em '+u:'';
  }catch(e){
    document.getElementById('grid').innerHTML='<p style="padding:30px;color:#aaa">Nenhum produto disponível ainda.</p>';
  }
}
function render(list){
  const g=document.getElementById('grid');
  const e=document.getElementById('empty');
  if(!list.length){g.innerHTML='';e.classList.remove('hidden');return;}
  e.classList.add('hidden');
  g.innerHTML=list.map(p=>{
    const img=p.image_url
      ?`<img class="card-img" src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">`
      :`<div class="card-placeholder">🛍️</div>`;
    const badge=p.badge_text?`<div class="card-badge">${p.badge_text}</div>`:'';
    return`<div class="card"><div class="card-img-wrap">${badge}${img}<div class="card-overlay"><span class="card-num">Prod. Nº ${p.num}</span><div class="card-name">${p.name}</div></div></div><div class="card-price">${p.price||''}</div><a class="card-btn" href="${p.affiliate_url||'#'}" rel="nofollow sponsored">Ver Produto</a></div>`;
  }).join('');
}
document.getElementById('num-input').addEventListener('input',function(){
  const v=this.value.trim();
  if(!v){render(all);return;}
  render(all.filter(p=>p.num===parseInt(v)));
});
function clearSearch(){
  document.getElementById('num-input').value='';
  render(all);
}
init();
</script>
</body>
</html>
